variables:
  REGISTRY_IMAGE_TAG: "$CI_COMMIT_TAG"
  K8S_NAMESPACE: extensions
  K8S_CHART_NAME: a11y-checker
  HELM_CHART_PATH: "${CI_PROJECT_DIR}/deploy/${K8S_CHART_NAME}"
  IMAGE_TAG_WEB: "$CI_REGISTRY_IMAGE-web:$CI_COMMIT_TAG"
  IMAGE_TAG_EXECUTOR: "$CI_REGISTRY_IMAGE-executor:$CI_COMMIT_TAG"

stages:
- publish
- deploy

publish:tag:web:
  stage: publish
  tags:
  - dockermultistage
  image: docker
  script:
  - docker buildx build -t "${IMAGE_TAG_WEB}" --push .
  rules:
  - if: "$CI_COMMIT_TAG != null && $CI_COMMIT_TAG =~ /^v[0-9]+(\\.[0-9]+){2,3}(-.+)?$/"
    when: on_success

deploy:tag:prod:
  environment: production
  stage: deploy
  tags:
  - prod
  - helm
  before_script:
  - helm version
  script:
  - 'helm upgrade --force --install ${K8S_CHART_NAME} --namespace ${K8S_NAMESPACE}
    -f ${HELM_CHART_PATH}/values.prod.yaml --set image.repository=${CI_REGISTRY_IMAGE}
    --set image.tag=${REGISTRY_IMAGE_TAG} ${HELM_CHART_PATH}
    '
  rules:
  - if: "$CI_COMMIT_TAG != null && $CI_COMMIT_TAG =~ /^v[0-9]+(\\.[0-9]+){2,3}$/"
    when: manual
